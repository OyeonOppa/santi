/* ============================================================
   SOUND EFFECTS — Web Audio API, no external files needed
   ============================================================ */
const SFX = (() => {
  let ctx = null;
  let _enabled = localStorage.getItem('sh_sfx') !== 'false';

  function ac() {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === 'suspended') ctx.resume();
    return ctx;
  }
  function tone(freq, type, dur, vol, at) {
    const c = ac();
    const t = at ?? c.currentTime;
    const osc = c.createOscillator();
    const gain = c.createGain();
    osc.connect(gain); gain.connect(c.destination);
    osc.type = type || 'sine';
    osc.frequency.setValueAtTime(freq, t);
    gain.gain.setValueAtTime(vol ?? 0.5, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
    osc.start(t); osc.stop(t + dur);
  }

  return {
    get enabled() { return _enabled; },
    toggle() { _enabled = !_enabled; localStorage.setItem('sh_sfx', _enabled); return _enabled; },
    // Subtle click feedback for buttons
    click() {
      if (!_enabled) return;
      tone(900, 'sine', 0.06, 0.35);
    },
    // Countdown beep for last 5 seconds
    beep(isLast) {
      if (!_enabled) return;
      tone(isLast ? 1047 : 880, 'sine', 0.1, 0.55);
    },
    // Timer end — three quick pulses
    alarm() {
      if (!_enabled) return;
      const c = ac(); const t = c.currentTime;
      tone(660, 'square', 0.15, 0.65, t);
      tone(660, 'square', 0.15, 0.65, t + 0.2);
      tone(880, 'square', 0.3, 0.75, t + 0.4);
    },
    // Phase transition — ascending chime
    chime() {
      if (!_enabled) return;
      const c = ac(); const t = c.currentTime;
      [523, 659, 784, 1047].forEach((f, i) => tone(f, 'sine', 0.4, 0.45, t + i * 0.1));
    },
    // Player joined — quick two-note ding
    join() {
      if (!_enabled) return;
      const c = ac(); const t = c.currentTime;
      tone(880, 'sine', 0.2, 0.45, t);
      tone(1100, 'sine', 0.32, 0.45, t + 0.15);
    }
  };
})();

/* ============================================================
   BGM — Background Music per phase
   Files: /audio/bgm1.mp3 … bgm4.mp3
   ============================================================ */
const BGM = (() => {
  const TRACKS = [
    { src: '/audio/bgm1.mp3', vol: 0.40 }, // 0: lobby, teams
    { src: '/audio/bgm2.mp3', vol: 0.40 }, // 1: category, cards, detail
    { src: '/audio/bgm3.mp3', vol: 0.15 }, // 2: discussion
    { src: '/audio/bgm4.mp3', vol: 0.30 }, // 3: summary
  ];
  const PHASE_TRACK = {
    lobby: 0, teams: 0,
    category: 1, cards: 1, 'custom-card': 1, detail: 1,
    discussion: 2,
    summary: 3,
  };

  let _audios = TRACKS.map(t => {
    const a = new Audio(t.src);
    a.loop = true;
    a.volume = 0;
    a.preload = 'auto';
    return a;
  });

  let _current = -1;
  let _started  = false;
  let _enabled  = localStorage.getItem('sh_bgm') !== 'false';

  function _fade(idx, toVol, ms, onDone) {
    const a = _audios[idx];
    const from = a.volume;
    const diff = toVol - from;
    const steps = Math.max(1, Math.round(ms / 30));
    let i = 0;
    const t = setInterval(() => {
      i++;
      a.volume = Math.min(1, Math.max(0, from + diff * (i / steps)));
      if (i >= steps) { clearInterval(t); if (onDone) onDone(); }
    }, 30);
  }

  function _play(idx) {
    if (idx < 0 || idx >= _audios.length) return;
    const a = _audios[idx];
    a.currentTime = a.paused ? 0 : a.currentTime;
    a.play().catch(() => {});
    _fade(idx, TRACKS[idx].vol, 1500);
  }

  function _stop(idx, cb) {
    _fade(idx, 0, 800, () => {
      _audios[idx].pause();
      if (cb) cb();
    });
  }

  function _switch(idx) {
    if (idx === _current) return;
    const prev = _current;
    _current = idx;
    if (prev >= 0 && !_audios[prev].paused) {
      _stop(prev);
    }
    _play(idx);
  }

  return {
    get enabled() { return _enabled; },

    // Called once on first user gesture (browser autoplay policy)
    start() {
      if (_started) return;
      _started = true;
      if (_enabled && _current >= 0) _play(_current);
    },

    // Call with current phase every render
    setPhase(phase) {
      const idx = PHASE_TRACK[phase] ?? -1;
      if (idx < 0) return;
      if (!_started) { _current = idx; return; } // queue
      if (!_enabled) return;
      _switch(idx);
    },

    toggle() {
      _enabled = !_enabled;
      localStorage.setItem('sh_bgm', String(_enabled));
      if (!_enabled) {
        _audios.forEach((a, i) => _stop(i));
      } else if (_started && _current >= 0) {
        _play(_current);
      }
      return _enabled;
    },
  };
})();

function getState() {
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    if (!s) return defaultState();
    const parsed = JSON.parse(s);
    // Migrate old "Harmony-XX" room codes to "SANTI-XX"
    if (parsed.roomCode && parsed.roomCode.startsWith('Harmony-')) {
      parsed.roomCode = 'SANTI-' + parsed.roomCode.replace('Harmony-','');
      localStorage.setItem(STORAGE_KEY, JSON.stringify(parsed));
    }
    return parsed;
  }
  catch(e) { return defaultState(); }
}

// Write state to localStorage AND push to server (non-blocking)
// Both stage AND mobile can write (mobile writes when joining / sending emotions)
let _lastSaveTs = 0;

function saveState(s) {
  _lastSaveTs = Date.now();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(s));
  // Broadcast to same-browser tabs
  try { BC && BC.postMessage({ type:'SYNC', state:s }); } catch(e){}
  // Push to server — all clients push, server holds latest truth
  if (IS_SERVER) {
    fetch('/api/state?room=' + encodeURIComponent(s.roomCode || ''), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(s)
    }).catch(() => {}); // silent fail if no server.js running
  }
}

function patchState(patch) {
  const s = { ...getState(), ...patch };
  saveState(s);
  render();
}

// Same-browser sync via BroadcastChannel
let BC = null;
try { BC = new BroadcastChannel('santi-harmony'); } catch(e){}
if (BC) BC.onmessage = (e) => {
  if (e.data.type === 'SYNC') {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(e.data.state));
    render();
  }
};
window.addEventListener('storage', (e) => {
  if (e.key === STORAGE_KEY) render();
});

/* ============================================================
   TIMER
   ============================================================ */
let _timer = null;
// Unique ID for this browser tab — prevents multiple tabs from running simultaneous timers
const _tabId = Math.random().toString(36).slice(2, 10);

function startTimer() {
  stopTimer();
  // Claim timer ownership; another tab starting will override this and our interval will stop
  localStorage.setItem('sh_timer_tab', _tabId);
  _timer = setInterval(() => {
    // Yield if another tab has claimed ownership
    if (localStorage.getItem('sh_timer_tab') !== _tabId) { stopTimer(); return; }
    const s = getState();
    if (!s.timerRunning) { stopTimer(); return; }
    const rem = s.timerSec - 1;
    if (rem <= 0) {
      stopTimer();
      localStorage.removeItem('sh_timer_tab');
      SFX.alarm();
      const ns = getState();
      if (ns.speakingTeam === 'A') {
        // Hold after Team A — wait for facilitator to manually switch to Team B
        saveState({ ...ns, timerSec: 0, timerRunning: false, teamADone: true });
      } else {
        // Hold after Team B — wait for facilitator to manually go to summary
        saveState({ ...ns, timerSec: 0, timerRunning: false, teamBDone: true });
      }
      render();
      return;
    }
    if (rem <= 30) SFX.beep(rem <= 3);
    const ns2 = getState();
    ns2.timerSec = rem;
    saveState(ns2);
    updateTimerUI(ns2);
  }, 1000);
}
function stopTimer() { clearInterval(_timer); _timer = null; }
function formatTime(s) {
  return String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0');
}
function updateTimerUI(state) {
  const el = document.getElementById('timer-num');
  if (el) el.textContent = formatTime(state.timerSec);
  const bar = document.getElementById('timer-bar');
  if (bar) {
    const total = state.timerInitialSec || (state.speakingTeam==='A' ? state.settings.teamATime : state.settings.teamBTime);
    const pct = Math.max(0, (state.timerSec/total)*100);
    bar.style.width = pct + '%';
    if (pct < 25) { bar.className = bar.className.replace(/from-\S+/g,'from-tertiary').replace(/to-\S+/g,'to-tertiary-container'); }
  }
  // Spawn floating reactions for any new ones received from mobile
  const reactions = state.reactions || [];
  const newOnes = reactions.slice(_lastReactionCount);
  _lastReactionCount = reactions.length;
  newOnes.forEach(r => spawnReaction(r.emoji));
}

function spawnReaction(emoji) {
  const container = document.getElementById('empathy-wave-area');
  if (!container) return;
  const el = document.createElement('div');
  el.className = 'reaction-float';
  el.textContent = emoji;
  el.style.left = (8 + Math.random() * 84) + '%';
  el.style.bottom = (10 + Math.random() * 30) + '%';
  container.appendChild(el);
  setTimeout(() => el.remove(), 2200);
}

function renderSummary(state) {
  const card = getCard(state.catId, state.cardId);
  const topEmotions = {};
  state.emotions.forEach(e => topEmotions[e.text] = (topEmotions[e.text]||0)+1);
  const sorted = Object.entries(topEmotions).sort((a,b)=>b[1]-a[1]).slice(0,8);

  // Emotions split by team
  const emotionsByTeam = { A: {}, B: {} };
  state.emotions.forEach(e => {
    const player = state.players.find(p => p.id === e.playerId);
    const team = player?.teamId || 'A';
    emotionsByTeam[team][e.text] = (emotionsByTeam[team][e.text] || 0) + 1;
  });
  const topA = Object.entries(emotionsByTeam.A).sort((a,b)=>b[1]-a[1]).slice(0,4);

    'ทางออกที่เป็นไปได้ที่ทำให้ทุกฝ่ายได้รับการดูแลความต้องการ คืออะไร?',

/* ============================================================
   MOBILE SCREENS
   ============================================================ */
function renderMobile(state) {
  const pid = getMobilePid();
  const player = state.players.find(p=>p.id===pid);

  if (!player) return renderMobileJoin(state);
  switch(state.phase) {
    case 'lobby': return renderMobileWaiting(state, player);
    case 'teams': return renderMobileTeamRole(state, player);
    case 'category': case 'cards': case 'detail': return renderMobileWaitingGame(state, player);
    case 'discussion': return renderMobileEmotions(state, player);
    case 'summary': return renderMobileSummary(state, player);
    default: return renderMobileWaiting(state, player);
  }
}

function getMobilePid() {
  let id = sessionStorage.getItem('sh_pid');
  if (!id) { id = 'p_' + Date.now() + '_' + Math.random().toString(36).slice(2,9); sessionStorage.setItem('sh_pid',id); }
  return id;
}

function mobileTopBar(title, phase='') {
  const state = getState();
  return `
  <nav class="fixed top-0 w-full z-50 bg-primary/90 backdrop-blur-xl h-14 flex items-center justify-between px-5">
    <span class="text-sm font-bold text-on-primary font-headline">${title}</span>
    <span class="text-xs bg-white/20 text-white px-2 py-0.5 rounded-full">${state.roomCode}</span>
  </nav>`;
}

function renderMobileJoin(state) {
  const pid = getMobilePid();
  const avatarIdx = Math.floor(Math.random()*AVATARS.length);
  // Room code from URL param (what the QR code encoded)
  const urlRoom = new URLSearchParams(location.search).get('room') || '';
  // Check if URL room matches current game room
  const roomMismatch = urlRoom && state.roomCode && urlRoom !== state.roomCode;

  return `
  <div class="min-h-screen bg-gradient-to-br from-primary to-primary-container flex flex-col">
    <div class="flex-1 flex flex-col items-center justify-center px-6 py-10">
      <div class="mb-6">${fillIcon('spa','text-6xl text-white opacity-80')}</div>

/* ── Confetti ────────────────────────────────────────────── */
function launchConfetti() {
  const canvas = document.createElement('canvas');
  canvas.style.cssText = 'position:fixed;inset:0;width:100%;height:100%;z-index:9999;pointer-events:none';
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  document.body.appendChild(canvas);
  const ctx = canvas.getContext('2d');
  const COLORS = ['#00464a','#4db6ac','#ff8f00','#e91e63','#7c4dff','#00bcd4','#ffd600','#43a047'];
  const pieces = Array.from({length: 130}, () => ({
    x:  Math.random() * canvas.width,
    y: -20 - Math.random() * 120,
    vx: (Math.random() - 0.5) * 4,
    vy:  2 + Math.random() * 4,
    w:  8 + Math.random() * 10,
    h:  4 + Math.random() * 5,
    color: COLORS[Math.floor(Math.random() * COLORS.length)],
    rot: Math.random() * Math.PI * 2,
    rs:  (Math.random() - 0.5) * 0.25,
  }));
  let frame = 0;
  (function tick() {
    frame++;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.globalAlpha = frame > 160 ? Math.max(0, 1 - (frame - 160) / 40) : 1;
    pieces.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.vy += 0.06; p.rot += p.rs;
      ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      ctx.restore();
    });
    if (ctx.globalAlpha > 0) requestAnimationFrame(tick);
    else canvas.remove();
  })();
}

// Surgical update — only patches changed values inside an already-open modal
function patchSettingsModal(state) {
  const m = document.getElementById('settings-modal');
  if (!m) return;
  const q = id => m.querySelector('#' + id);

  const ta = q('set-timer-a'); if (ta) ta.textContent = formatTime(state.settings.teamATime);
  const tb = q('set-timer-b'); if (tb) tb.textContent = formatTime(state.settings.teamBTime);

  const rc = m.querySelector('#room-code-input');
  if (rc && document.activeElement !== rc) rc.value = state.roomCode;

  const bgmIcon = q('set-bgm-icon');
  if (bgmIcon) {
    bgmIcon.className = `w-9 h-9 rounded-full ${BGM.enabled ? 'bg-primary/10' : 'bg-surface-container'} flex items-center justify-center transition-colors`;
    bgmIcon.innerHTML = icon(BGM.enabled ? 'music_note' : 'music_off', BGM.enabled ? 'text-primary' : 'text-on-surface-variant');

  const bgmBtn = q('set-bgm-toggle');
  if (bgmBtn) {
    bgmBtn.className = `relative w-12 h-6 rounded-full transition-colors ${BGM.enabled ? 'bg-primary' : 'bg-surface-container-highest'}`;
    bgmBtn.querySelector('span').className = `absolute top-0.5 transition-all duration-200 w-5 h-5 rounded-full bg-white shadow ${BGM.enabled ? 'left-6' : 'left-0.5'}`;
  }

  const sfxIcon = q('set-sfx-icon');
  if (sfxIcon) {
    sfxIcon.className = `w-9 h-9 rounded-full ${SFX.enabled ? 'bg-primary/10' : 'bg-surface-container'} flex items-center justify-center transition-colors`;

  }

  if (sfxBtn) {
    sfxBtn.className = `relative w-12 h-6 rounded-full transition-colors ${SFX.enabled ? 'bg-primary' : 'bg-surface-container-highest'}`;
    sfxBtn.querySelector('span').className = `absolute top-0.5 transition-all duration-200 w-5 h-5 rounded-full bg-white shadow ${SFX.enabled ? 'left-6' : 'left-0.5'}`;

  const pc = q('set-player-count'); if (pc) pc.textContent = state.players.length + ' Online';

  if (pl) pl.innerHTML = state.players.length === 0

          <div class="w-2 h-2 rounded-full bg-emerald-400 flex-shrink-0"></div>

  const ph = q('set-phase-list');
  if (ph) ph.innerHTML = ['lobby','teams','category','cards','detail','discussion','summary'].map(p => `
    <div class="flex items-center gap-2 ${state.phase===p?'text-primary font-bold':'text-on-surface-variant'}">
      <div class="w-2 h-2 rounded-full ${state.phase===p?'bg-primary':'bg-surface-container-highest'} flex-shrink-0"></div>

/* ============================================================
   MAIN RENDER
   ============================================================ */
function render() {
  const mode = getMode();
  const state = getState();
  const app = document.getElementById('app');
  if (!app) return;

  if (mode === 'mobile') {
    // During discussion, only update timer elements — no full re-render every second
    if (state.phase === 'discussion' && document.getElementById('mob-timer-sec')) {
      updateMobileTimerUI(state);
    } else {
      app.innerHTML = renderMobile(state);
      afterRender(mode, state);
    }
  } else if (_showSettings) {
    // Modal is open — patch only changed values, skip stage re-render
    const existing = document.getElementById('settings-modal');
    if (existing) {
      patchSettingsModal(state);
      // skip afterRender — stage is hidden, no need to regenerate QR etc.
    } else {
      // First open: render stage + mount modal
      app.innerHTML = renderStage(state);
      afterRender(mode, state);
      const overlay = document.createElement('div');
      overlay.id = 'settings-modal';
      overlay.innerHTML = renderSettings(state);
      document.body.appendChild(overlay);
    }
  } else {
    app.innerHTML = renderStage(state);
    document.getElementById('settings-modal')?.remove();
    afterRender(mode, state);
    // Confetti on first entry into summary
    if (state.phase === 'summary' && _prevPhase !== 'summary') launchConfetti();
  }
  _prevPhase = state.phase;

  // PIN modal
  document.getElementById('pin-modal')?.remove();
  if (_showPin && mode !== 'mobile') {
    const pm = document.createElement('div');
    pm.id = 'pin-modal';
    pm.innerHTML = renderPinModal();
    document.body.appendChild(pm);
  }
}

function renderStage(state) {
  switch(state.phase) {
    case 'lobby':       return renderLobby(state);
    case 'teams':       return renderTeams(state);
    case 'category':    return renderCategory(state);
    case 'cards':       return renderCards(state);
    case 'custom-card': return renderCustomCardForm(state);
    case 'detail':      return renderCardDetail(state);
    case 'discussion':  return renderDiscussion(state);
    case 'summary':     return renderSummary(state);
    default:            return renderLobby(state);
  }
}

function afterRender(mode, state) {
  if (mode === 'stage') {
    if (state.phase === 'lobby') generateQR(state.roomCode);
    if (state.phase === 'discussion') {
      updateTimerUI(state);
    }
    BGM.setPhase(state.phase);
  }
}

// Surgical mobile timer update — avoids full re-render every second
function updateMobileTimerUI(state) {
  const secEl = document.getElementById('mob-timer-sec');
  if (!secEl) return;
  const timerInit = state.timerInitialSec || (state.speakingTeam==='A' ? state.settings.teamATime : state.settings.teamBTime) || 180;
  const pct  = Math.min(100, Math.round(((state.timerSec||0) / timerInit) * 100));
  const warn = (state.timerSec||0) <= 30 && (state.timerSec||0) > 0;
  const tcol = state.speakingTeam==='A' ? 'text-primary' : 'text-tertiary';
  const bcol = state.speakingTeam==='A' ? 'bg-primary'   : 'bg-tertiary';

  secEl.textContent = formatTime(state.timerSec||0);
  secEl.className   = `text-3xl font-extrabold tabular-nums font-headline ${warn?'text-error':tcol}`;

  const bar = document.getElementById('mob-timer-bar');
  if (bar) { bar.style.width = pct+'%'; bar.className = `h-full rounded-full transition-all duration-1000 ${warn?'bg-error':bcol}`; }

  const team = document.getElementById('mob-timer-team');
  if (team) {
    team.innerHTML = `<span class="material-symbols-outlined text-base">mic</span> ทีม ${state.speakingTeam} กำลังพูด`;
    team.className = `text-sm font-bold ${tcol} flex items-center gap-1.5`;
  }

  const pid    = getMobilePid();
  const player = state.players.find(p => p.id === pid);
  const myTurn = player && state.speakingTeam === player.teamId;
  const card   = state.cardId ? getCard(state.catId, state.cardId) : null;
  const isA    = player?.teamId === 'A';
  const roleName = card ? (isA ? card.teamARoleName : card.teamBRoleName) : (isA ? 'ทีม A' : 'ทีม B');

  const banner = document.getElementById('mob-turn-banner');
  if (banner) {
    banner.className = `${myTurn ? 'bg-primary/10 border border-primary/20' : 'bg-secondary-container/40'} rounded-2xl p-4 mb-3 flex items-center gap-3`;
    banner.innerHTML = myTurn ? `
      <span class="material-symbols-outlined text-primary text-2xl flex-shrink-0">mic</span>
      <div>
        <p class="font-bold text-primary text-sm">ถึงคิวทีมคุณแล้ว!</p>
        <p class="text-xs text-on-surface-variant mt-0.5">แสดงความคิดเห็นตามบทบาท <strong>${roleName}</strong></p>
      </div>` : `
      <span class="material-symbols-outlined text-on-secondary-container text-2xl flex-shrink-0">hearing</span>
      <div>
        <p class="font-bold text-on-secondary-container text-sm">ฟังอย่างตั้งใจ</p>
        <p class="text-xs text-on-surface-variant mt-0.5">ทีม ${state.speakingTeam} กำลังแสดงมุมมอง</p>
      </div>`;
  }

  const log = document.getElementById('mob-emotion-log');
  if (log) log.innerHTML = renderMobileEmotionLog(state.emotions, pid);
}

function getMobileURL(roomCode) {
  return `${location.protocol}//${location.host}${location.pathname}?view=mobile&room=${encodeURIComponent(roomCode)}`;
}

function generateQR(roomCode) {
  const qrEl = document.getElementById('qr-code');
  if (!qrEl) return;
  qrEl.innerHTML = '';
  const url = getMobileURL(roomCode);
  // Update the link display too
  const linkEl = document.getElementById('mobile-url');
  if (linkEl) linkEl.textContent = url;
  if (typeof QRCode !== 'undefined') {
    new QRCode(qrEl, { text:url, width:130, height:130, colorDark:'#00464a', colorLight:'#ffffff', correctLevel:QRCode.CorrectLevel.M });
  } else {
    qrEl.innerHTML = `<div class="text-xs text-on-surface-variant p-3 font-mono break-all">${url}</div>`;
  }
}

document.addEventListener('click', (e) => {
  BGM.start(); // unlock autoplay on first user gesture
  const el = e.target.closest('[data-action]');
  if (!el) return;
  // Play click SFX for most actions (chime/alarm actions play their own sound)
  const raw = el.dataset.action;
  if (!['go-category','start-discussion','go-summary','toggle-sfx'].includes(raw.split(':')[0])) {
    SFX.click();
  }
  const [action, ...rest] = raw.split(':');
  handleAction(action, rest.join(':'), el, e);
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    const joinBtn = document.querySelector('[data-action="mobile-join"]');
    if (joinBtn) joinBtn.click();
    const customBtn = document.querySelector('[data-action="send-custom-emotion"]');
    if (customBtn) customBtn.click();
  }
});

function handleAction(action, param, el, e) {
  const state = getState();
  switch(action) {

    case 'assign-teams': {
      if (state.players.length < 2) return;
      const shuffled = [...state.players].sort(()=>Math.random()-.5);
      const half = Math.ceil(shuffled.length/2);
      const players = shuffled.map((p,i) => ({...p, teamId: i < half ? 'A' : 'B'}));
      patchState({ players, phase:'teams' });
      break;
    }

    case 'go-lobby':       SFX.click(); patchState({ phase:'lobby' }); break;
    case 'go-teams':       SFX.click(); patchState({ phase:'teams' }); break;
    case 'go-category':    SFX.chime(); patchState({ phase:'category' }); break;
    case 'go-custom-card': SFX.click(); patchState({ phase:'custom-card', catId:'custom', cardId:'custom' }); break;

    case 'save-custom-card': {
      const title    = document.getElementById('cc-title')?.value.trim();
      const teamAName = document.getElementById('cc-teamAName')?.value.trim();
      const teamBName = document.getElementById('cc-teamBName')?.value.trim();
      if (!title || !teamAName || !teamBName) {
        alert('กรุณากรอกชื่อกรณีศึกษา และชื่อบทบาทของทั้งสองทีม');
        return;
      }
      const customCard = {
        id: 'custom', catId: 'custom',
        title,
        shortDesc:    document.getElementById('cc-shortDesc')?.value.trim() || '',
        fullDesc:     document.getElementById('cc-shortDesc')?.value.trim() || '',
        tags:         ['#Custom'],
        from: 'from-secondary', to: 'to-secondary-container',
        teamARoleName: teamAName,
        teamARoleSub:  'Team A',
        teamARoleIcon: 'groups',
        teamARoleDesc: document.getElementById('cc-teamADesc')?.value.trim() || teamAName,
        teamBRoleName: teamBName,
        teamBRoleSub:  'Team B',
        teamBRoleIcon: 'groups',
        teamBRoleDesc: document.getElementById('cc-teamBDesc')?.value.trim() || teamBName,
        question:     document.getElementById('cc-question')?.value.trim() || '',
      };
      SFX.chime();
      patchState({ customCard, catId:'custom', cardId:'custom', phase:'detail' });
      break;
    }
    case 'go-cards':    SFX.click(); patchState({ phase:'cards' }); break;
    case 'go-detail':   SFX.click(); stopTimer(); patchState({ phase:'detail', timerRunning:false, timerSec: state.settings.teamATime, teamADone:false, teamBDone:false }); break;
    case 'new-round':   SFX.chime(); patchState({ phase:'category', catId:null, cardId:null, timerRunning:false, timerSec: state.settings.teamATime, teamADone:false, teamBDone:false, emotions:[], reactions:[], votes:{} }); break;

    case 'select-cat': {
      patchState({ catId: param, cardId:null, phase:'cards' });
      break;
    }

    case 'select-card': {
      patchState({ cardId: param, phase:'detail' });
      break;
    }

    case 'start-discussion': {
      SFX.chime();
      patchState({ phase:'discussion', speakingTeam:'A', timerSec: state.settings.teamATime, timerInitialSec: state.settings.teamATime, timerRunning:false, teamADone:false, teamBDone:false, emotions:[], reactions:[], votes:{} });
      break;
    }

    case 'toggle-timer': {
      const running = !state.timerRunning;
      const ns = { ...getState(), timerRunning: running };
      saveState(ns);
      if (running) startTimer();
      else stopTimer();
      render();
      break;
    }

    case 'timer-plus': {
      const ns = getState();
      const newSec = ns.timerSec + 60;
      const newInit = Math.max(ns.timerInitialSec || 0, newSec);
      patchState({ timerSec: newSec, timerInitialSec: newInit });
      break;
    }

    case 'timer-minus': {
      const s = Math.max(10, getState().timerSec - 60);
      patchState({ timerSec: s });
      break;
    }

    case 'go-next-team': {
      stopTimer();
      const ns = getState();
      if (ns.speakingTeam === 'A') {
        patchState({ speakingTeam:'B', timerSec: ns.settings.teamBTime, timerInitialSec: ns.settings.teamBTime, timerRunning:false, teamADone:true });
      } else {
        // Switch back to Team A
        patchState({ speakingTeam:'A', timerSec: ns.settings.teamATime, timerInitialSec: ns.settings.teamATime, timerRunning:false, teamADone:false });
      }
      break;
    }

    case 'go-summary': {
      stopTimer();
      SFX.chime();
      patchState({ phase:'summary', timerRunning:false });
      break;
    }

    case 'reset-game': {
      stopTimer();
      const fresh = defaultState();
      fresh.roomCode = state.roomCode;
      saveState(fresh);
      // Clear player session only in mobile
      if (getMode() === 'mobile') sessionStorage.removeItem('sh_pid');
      render();
      break;
    }

    case 'add-demo-players': {
      const target = parseInt(param) || 12;
      const existing = state.players.length;
      const toAdd = target; // always add N more (not capped to target total)
      const newPlayers = [];
      for (let i = 0; i < toAdd; i++) {
        const idx = (existing + i) % DEMO_NAMES.length;
        newPlayers.push({ id:'demo_'+Date.now()+'_'+i, name:DEMO_NAMES[idx], avatar:AVATARS[idx%AVATARS.length], teamId:null });
      }
      patchState({ players: [...state.players, ...newPlayers] });
      break;
    }

    case 'clear-players': {
      patchState({ players:[] });
      break;
    }

    case 'copy-room': {
      navigator.clipboard.writeText(state.roomCode).catch(()=>{});
      const orig = el.innerHTML;
      el.innerHTML = icon('check','text-primary');
      setTimeout(()=>{ el.innerHTML = orig; }, 1500);
      break;
    }

    case 'mobile-join': {
      const nameEl = document.getElementById('mobile-name');
      const name = nameEl?.value.trim();
      if (!name) { nameEl?.focus(); return; }
      const pid = el.dataset.pid;
      const avatarIdx = parseInt(el.dataset.avatar||'0');
      if (state.players.find(p=>p.id===pid)) { render(); return; }
      const player = { id:pid, name, avatar:AVATARS[avatarIdx%AVATARS.length], teamId:null };
      patchState({ players:[...state.players, player] });
      break;
    }

    case 'send-emotion': {
      const text = decodeURIComponent(param);
      const pid = getMobilePid();
      const emotion = { text, pid, id:Date.now()+'_'+Math.random().toString(36).slice(2) };
      patchState({ emotions:[...state.emotions, emotion] });
      // Animate feedback
      el.classList.add('scale-95','opacity-50');
      setTimeout(()=>{ el.classList.remove('scale-95','opacity-50'); },300);
      break;
    }

    case 'send-custom-emotion': {
      const input = document.getElementById('custom-emotion');
      const text = input?.value.trim();
      if (!text) return;
      const pid = getMobilePid();
      const emotion = { text, pid, id:Date.now()+'_'+Math.random().toString(36).slice(2) };
      patchState({ emotions:[...state.emotions, emotion] });
      if (input) input.value = '';
      break;
    }

    case 'send-reaction': {
      const emoji = decodeURIComponent(param);
      const pid = getMobilePid();
      if (!pid) break;
      const reaction = { emoji, pid, id: Date.now()+'_'+pid };
      patchState({ reactions: [...(state.reactions||[]), reaction] });
      // Quick visual pulse on button
      el.classList.add('scale-150');
      setTimeout(() => el.classList.remove('scale-150'), 250);
      break;
    }

    case 'cast-vote': {
      const optId = param;
      const pid = getMobilePid();
      if (!pid) break;
      const votes = state.votes || {};
      // One vote per player
      if (Object.values(votes).some(arr => arr.includes(pid))) break;
      patchState({ votes: { ...votes, [optId]: [...(votes[optId]||[]), pid] } });
      break;
    }

    case 'set-time': {
      const [team, deltaStr] = param.split(':');
      const delta = parseInt(deltaStr) * 60;
      const key = team==='A' ? 'teamATime' : 'teamBTime';
      const cur = state.settings[key];
      const next = Math.max(30, cur + delta);
      patchState({ settings:{...state.settings, [key]:next} });
      break;
    }

    case 'save-room-code': {
      const input = document.getElementById('room-code-input');
      const val = (input?.value || '').trim().toUpperCase().replace(/\s+/g,'');
      if (val.length >= 2) patchState({ roomCode: val });
      break;
    }

    case 'random-room-code': {
      const n = Math.floor(Math.random()*90+10);
      const newCode = 'SANTI-' + n;
      const input = document.getElementById('room-code-input');
      if (input) input.value = newCode;
      patchState({ roomCode: newCode });
      break;
    }


    case 'save-pin': {
      const val = (document.getElementById('pin-new')?.value || '').trim();
      if (/^\d{4}$/.test(val)) {
        localStorage.setItem('sh_pin', val);
        document.getElementById('pin-new').value = '';
        const msg = document.getElementById('pin-save-msg');
        if (msg) { msg.classList.remove('hidden'); setTimeout(() => msg.classList.add('hidden'), 2000); }
      }
      break;
    }

    case 'toggle-bgm': {
      const on = BGM.toggle();
      if (on) BGM.start();
      render();
      break;
    }

    case 'toggle-sfx': {
      const on = SFX.toggle();
      if (on) SFX.chime();
      render();
      break;
    }

    case 'toggle-fullscreen': {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(()=>{});
      } else {
        document.exitFullscreen().catch(()=>{});
      }
      break;
    }

    case 'open-settings': {
      if (_pinVerified) {
        _showSettings = true;
      } else {
        _showPin = true;
        _pinBuffer = '';
      }
      render();
      break;
    }

    case 'pin-key': {
      const k = param;
      if (k === '⌫') {
        _pinBuffer = _pinBuffer.slice(0, -1);
      } else if (_pinBuffer.length < 4) {
        _pinBuffer += k;
      }
      // Update dots live (no full render)
      const dots = document.getElementById('pin-dots');
      if (dots) dots.innerHTML = [0,1,2,3].map(i =>
        `<div class="w-4 h-4 rounded-full transition-colors ${i < _pinBuffer.length ? 'bg-primary' : 'bg-surface-container-high'}"></div>`
      ).join('');
      // Check when 4 digits entered
      if (_pinBuffer.length === 4) {
        const correct = localStorage.getItem('sh_pin') || '1234';
        if (_pinBuffer === correct) {
          _pinVerified = true;
          _showPin = false;
          _showSettings = true;
          _pinBuffer = '';
          render();
        } else {
          const errEl = document.getElementById('pin-error');
          if (errEl) errEl.textContent = 'รหัสไม่ถูกต้อง ลองใหม่อีกครั้ง';
          // Shake the dot row
          if (dots) { dots.classList.add('animate-pulse'); setTimeout(() => dots.classList.remove('animate-pulse'), 600); }
          _pinBuffer = '';
          setTimeout(() => {
            const e2 = document.getElementById('pin-error');
            if (e2) e2.textContent = '';
            const d2 = document.getElementById('pin-dots');
            if (d2) d2.innerHTML = [0,1,2,3].map(i =>
              `<div class="w-4 h-4 rounded-full bg-surface-container-high"></div>`
            ).join('');
          }, 1200);
        }
      }
      break;
    }

    case 'close-settings': {
      // Only close when clicking directly on backdrop, not bubbled from inside modal
      if (e.target === el) {
        _showSettings = false;
        render();
      }
      break;
    }
  }
}

/* ============================================================
   INIT
   ============================================================ */
async function init() {
  const mode = getMode();
  const urlRoom = new URLSearchParams(location.search).get('room') || '';

  if (mode === 'mobile') {
    // MOBILE: never create own state — always pull from server or stage
    await initMobile(urlRoom);
    return;
  }

  // STAGE / SETTINGS: create state if needed, push to server
  if (IS_SERVER) {
    try {
      const existingRoom = localStorage.getItem(STORAGE_KEY)
        ? (JSON.parse(localStorage.getItem(STORAGE_KEY)).roomCode || '')
        : '';
      const res = await fetch('/api/state?room=' + encodeURIComponent(existingRoom));
      if (!res.ok) throw new Error('no-api');
      const serverState = await res.json();
      if (serverState && serverState.roomCode) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(serverState));
      } else {
        if (!localStorage.getItem(STORAGE_KEY)) saveState(defaultState());
        else saveState(getState()); // push existing state to server
      }
    } catch(e) {
      // No server.js API — static server fallback
      if (!localStorage.getItem(STORAGE_KEY)) saveState(defaultState());
    }
  } else {
    if (!localStorage.getItem(STORAGE_KEY)) saveState(defaultState());
  }

  render();
  const s = getState();
  if (s && s.phase === 'discussion' && s.timerRunning) startTimer();
  // Stage also subscribes to SSE so it receives updates when players join from mobile
  if (IS_SERVER) connectSSE();
}

// Mobile-specific init: wait for server state, never create own state
async function initMobile(urlRoom) {
  if (IS_SERVER) {
    try {
      const res = await fetch('/api/state?room=' + encodeURIComponent(urlRoom));
      if (!res.ok) throw new Error('no-api');
      const serverState = await res.json();
      if (serverState && serverState.roomCode) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(serverState));
        connectSSE(urlRoom);
        render();
        return;
      }
      // Server online but no game yet — wait for stage to start
      showConnecting(urlRoom, 'waiting');
      pollMobileState(urlRoom);
    } catch(e) {
      // No /api/state (running npx serve, not node server.js)
      if (localStorage.getItem(STORAGE_KEY)) {
        render(); // same device — already have state from stage tab
      } else {
        showConnecting(urlRoom, 'no-api');
        // Keep checking localStorage in case stage opens on same device
        const poll = setInterval(() => {
          if (localStorage.getItem(STORAGE_KEY)) { clearInterval(poll); render(); }
        }, 1000);
      }
    }
  } else {
    // file:// — same device only
    if (localStorage.getItem(STORAGE_KEY)) render();
    else {
      showConnecting(urlRoom, 'no-api');
      const poll = setInterval(() => {
        if (localStorage.getItem(STORAGE_KEY)) { clearInterval(poll); render(); }
      }, 1000);
    }
  }
}

function showConnecting(urlRoom, reason) {
  const app = document.getElementById('app');
  if (!app) return;
  const isNoApi = reason === 'no-api';
  app.innerHTML = `
  <div class="min-h-screen bg-gradient-to-br from-primary to-primary-container flex flex-col items-center justify-center px-6 text-center">
    <div class="mb-6 ${isNoApi ? '' : 'animate-pulse'}">${fillIcon('spa','text-6xl text-white opacity-80')}</div>
    <h1 class="text-3xl font-extrabold text-white font-headline mb-3">
      ${isNoApi ? 'เชื่อมต่อไม่สำเร็จ' : 'กำลังเชื่อมต่อ...'}
    </h1>
    ${urlRoom ? `<p class="text-white/70 mb-5">ห้อง: <span class="font-bold text-white">${urlRoom}</span></p>` : ''}
    <div class="bg-white/15 backdrop-blur rounded-3xl p-6 max-w-xs w-full">
      ${isNoApi ? `
        <p class="text-white font-bold text-sm mb-2">ต้องรัน server.js ก่อน</p>
        <p class="text-white/80 text-sm leading-relaxed mb-3">เปิด Terminal บนคอมพิวเตอร์วิทยากรแล้วพิมพ์:</p>
        <code class="block bg-black/30 text-white/90 text-xs px-4 py-3 rounded-xl font-mono mb-4">node server.js</code>
        <p class="text-white/60 text-xs">จากนั้นสแกน QR ใหม่</p>
      ` : `
        <div class="flex items-center justify-center gap-3 text-white/80 text-sm mb-3">
          <span class="w-2.5 h-2.5 bg-white rounded-full animate-ping flex-shrink-0"></span>
          รอวิทยากรเปิดเซสชัน...
        </div>
        <p class="text-white/50 text-xs">หน้านี้จะอัปเดตเองเมื่อเซสชันเริ่ม</p>
      `}
    </div>
  </div>`;
}

function pollMobileState(urlRoom, attempt) {
  attempt = attempt || 0;
  if (attempt > 90) return; // give up after 3 min
  setTimeout(async () => {
    try {
      const res = await fetch('/api/state?room=' + encodeURIComponent(urlRoom));
      if (!res.ok) throw new Error('no-api');
      const serverState = await res.json();
      if (serverState && serverState.roomCode) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(serverState));
        connectSSE(urlRoom);
        render();
        return;
      }
    } catch(e) {}
    pollMobileState(urlRoom, attempt + 1);
  }, 2000);
}

// Server-Sent Events — real-time push from server to all clients (stage + mobile)
function connectSSE(roomCode) {
  if (!roomCode) {
    const s = localStorage.getItem(STORAGE_KEY);
    roomCode = s ? (JSON.parse(s).roomCode || '') : '';
  }
  const evtSource = new EventSource('/api/events?room=' + encodeURIComponent(roomCode));
  evtSource.onmessage = (e) => {
    try {
      const serverState = JSON.parse(e.data);
      if (!serverState || !serverState.roomCode) return;
      const prev = getState();
      const prevCount = prev?.players?.length ?? 0;
      // Bounce-guard: ignore own timer bounces — but always pass through cross-client updates
      const emotionsChanged  = (serverState.emotions?.length  ?? 0) !== (prev?.emotions?.length  ?? 0);
      const playersChanged   = (serverState.players?.length   ?? 0) !== prevCount;
      const reactionsChanged = (serverState.reactions?.length ?? 0) !== (prev?.reactions?.length ?? 0);
      const votesChanged     = JSON.stringify(serverState.votes||{}) !== JSON.stringify(prev?.votes||{});
      if (getMode() !== 'mobile' && Date.now() - _lastSaveTs < 1000 && !emotionsChanged && !playersChanged && !reactionsChanged && !votesChanged) return;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(serverState));
      if (serverState.players?.length > prevCount) SFX.join();
      render();
    } catch(ex) {}
  };
  evtSource.onerror = () => {
    evtSource.close();
    // Fall back to polling every 2 seconds
    setInterval(async () => {
      try {
        const res = await fetch('/api/state?room=' + encodeURIComponent(roomCode));
        const s = await res.json();
        if (s && s.roomCode) {
          // Same bounce-guard for stage polling
          if (getMode() !== 'mobile' && Date.now() - _lastSaveTs < 1000) return;
          localStorage.setItem(STORAGE_KEY, JSON.stringify(s));
          render();
        }
      } catch(ex) {}
    }, 2000);
  };
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}

init();
</script>
