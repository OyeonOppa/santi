/* ============================================================
   STATE  —  localStorage (same-device) + Server API (cross-device)
   ============================================================ */
const STORAGE_KEY = 'santi_harmony_v2';

// Detect if we're running from an HTTP server (not file://)
// When served by server.js, we use /api/state for cross-device sync
const IS_SERVER = location.protocol === 'http:' || location.protocol === 'https:';

function defaultState() {
  const n = Math.floor(Math.random()*90+10);
  return {
    phase: 'lobby',
    roomCode: 'SANTI-' + n,
    players: [],
    catId: null,
    cardId: null,
    speakingTeam: 'A',
    timerRunning: false,
    timerSec: 180,
    teamADone: false,
    teamBDone: false,
    emotions: [],
    settings: { teamATime: 180, teamBTime: 180, maxPlayers: 0 }
  };
}

function getState() {
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    if (!s) return defaultState();
    const parsed = JSON.parse(s);
    // Migrate old "Harmony-XX" room codes to "SANTI-XX"
    if (parsed.roomCode && parsed.roomCode.startsWith('Harmony-')) {
      parsed.roomCode = 'SANTI-' + parsed.roomCode.replace('Harmony-','');
      localStorage.setItem(STORAGE_KEY, JSON.stringify(parsed));
    }
    return parsed;
  }
  catch(e) { return defaultState(); }
}

// Write state to localStorage AND push to server (non-blocking)
// Both stage AND mobile can write (mobile writes when joining / sending emotions)
let _lastSaveTs = 0;

function saveState(s) {
  _lastSaveTs = Date.now();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(s));
  // Broadcast to same-browser tabs
  try { BC && BC.postMessage({ type:'SYNC', state:s }); } catch(e){}
  // Push to server — all clients push, server holds latest truth
  if (IS_SERVER) {
    fetch('/api/state?room=' + encodeURIComponent(s.roomCode || ''), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(s)
    }).catch(() => {}); // silent fail if no server.js running
  }
}

function patchState(patch) {
  const s = { ...getState(), ...patch };
  saveState(s);
  render();
}

// Same-browser sync via BroadcastChannel
let BC = null;
try { BC = new BroadcastChannel('santi-harmony'); } catch(e){}
if (BC) BC.onmessage = (e) => {
  if (e.data.type === 'SYNC') {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(e.data.state));
    render();
  }
};
window.addEventListener('storage', (e) => {
  if (e.key === STORAGE_KEY) render();
});

/* ============================================================
   TIMER
   ============================================================ */
let _timer = null;

function startTimer() {
  stopTimer();
  _timer = setInterval(() => {
    const s = getState();
    if (!s.timerRunning) { stopTimer(); return; }
    const rem = s.timerSec - 1;
    if (rem <= 0) {
      stopTimer();
      const ns = getState();
      if (ns.speakingTeam === 'A') {
        // Hold after Team A — wait for facilitator to manually switch to Team B
        saveState({ ...ns, timerSec: 0, timerRunning: false, teamADone: true });
      } else {
        // Hold after Team B — wait for facilitator to manually go to summary
        saveState({ ...ns, timerSec: 0, timerRunning: false, teamBDone: true });
      }
      render();
      return;
    }
    const ns2 = getState();
    ns2.timerSec = rem;
    saveState(ns2);
    updateTimerUI(ns2);
  }, 1000);
}
function stopTimer() { clearInterval(_timer); _timer = null; }
function formatTime(s) {
  return String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0');
}
function updateTimerUI(state) {
  const el = document.getElementById('timer-num');
  if (el) el.textContent = formatTime(state.timerSec);
  const bar = document.getElementById('timer-bar');
  if (bar) {
    const total = state.speakingTeam==='A' ? state.settings.teamATime : state.settings.teamBTime;
    const pct = Math.max(0, (state.timerSec/total)*100);
    bar.style.width = pct + '%';
    if (pct < 25) { bar.className = bar.className.replace(/from-\S+/g,'from-tertiary').replace(/to-\S+/g,'to-tertiary-container'); }
  }
}

/* --- DISCUSSION --- */
function renderDiscussion(state) {
  const card = getCard(state.catId, state.cardId);
  const isA = state.speakingTeam === 'A';
  const speakerName = isA ? (card?.teamARoleName||'ทีม A') : (card?.teamBRoleName||'ทีม B');
  const speakerSub = isA ? (card?.teamARoleSub||'Team A') : (card?.teamBRoleSub||'Team B');
  const bgClass = isA ? 'bg-primary/5' : 'bg-tertiary-fixed/20';
  const accentClass = isA ? 'text-primary' : 'text-tertiary';
  const totalTime = isA ? state.settings.teamATime : state.settings.teamBTime;
  const pct = Math.max(0, (state.timerSec/totalTime)*100);

  // Wave chips
  const chips = state.emotions.slice(-20).map((e,i) => {
    const cls = WAVE_COLORS[i % WAVE_COLORS.length];
    const sizes = ['text-sm','text-base','text-lg','text-xl'];
    const sz = sizes[Math.floor(Math.random()*sizes.length)];
    const rot = ['rotate-0','-rotate-1','rotate-1','-rotate-2','rotate-2'][i%5];
    return `<span class="emotion-chip ${cls} px-4 py-2 rounded-full font-medium shadow-sm ${sz} ${rot}" style="animation-delay:${i*0.05}s">${e.text}</span>`;
  }).join('');

  return `
  ${stageNav(state)}
  <main class="max-w-6xl mx-auto px-6 py-8 pb-24">
    ${card ? `
    <!-- Scenario image banner -->
    <div class="rounded-3xl overflow-hidden relative mb-6 shadow-md" style="height:200px">
      <img src="${IMGS[card.id]||''}" alt="${card.title}" class="w-full h-full object-cover absolute inset-0">

      <div class="absolute inset-0 flex items-center px-8">
        <div>
          <p class="text-white/70 text-xs font-bold uppercase tracking-widest mb-2">กรณีศึกษา</p>
          <h2 class="text-white font-headline font-bold text-2xl leading-snug mb-3 max-w-xl">${card.title}</h2>
          <div class="flex flex-wrap gap-2">
            ${(card.tags||[]).map(t=>`<span class="bg-white/20 backdrop-blur-sm text-white text-xs px-3 py-1 rounded-full font-medium">${t}</span>`).join('')}
          </div>

      </div>
    </div>` : ''}

      <!-- Left: Timer + Roles -->

        <!-- Active Speaker Card -->

          <div class="absolute top-5 right-5">
            <span class="flex h-3 w-3">

            </span>
          </div>
          <div class="flex flex-col items-center text-center">
            <span class="bg-surface-container-lowest text-on-surface px-4 py-1 rounded-full text-xs font-bold tracking-wider mb-4">LIVE SESSION</span>
            <h2 class="text-2xl font-bold ${accentClass}">${speakerName}</h2>
            <p class="text-on-surface-variant text-sm mb-6">${speakerSub} · กำลังพูด</p>
            <div id="timer-num" class="text-8xl font-black font-headline tabular-nums ${accentClass} tracking-tighter leading-none mb-4">${formatTime(state.timerSec)}</div>
            <div class="w-full bg-surface-container-highest h-2 rounded-full overflow-hidden mt-2">

            </button>

              ${state.timerRunning ? fillIcon('pause','text-3xl') : fillIcon('play_arrow','text-3xl')}

            </div>
            <div class="bg-surface-container-lowest rounded-2xl p-4 flex items-center gap-3 ${!isA?'ring-2 ring-tertiary/30':''}">
              ${icon(card?.teamBRoleIcon||'groups',`${!isA?'text-tertiary':'text-on-surface-variant'}`)}

            <button data-action="go-next-team" class="w-full bg-tertiary text-on-tertiary py-3 rounded-full font-bold hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center gap-2">
              ${icon('swap_horiz')} สลับให้ทีม B พูด
            </button>`}
          </div>
        </section>
        ${state.teamADone && state.speakingTeam === 'B' ? `
        <div class="text-center">
          <button data-action="go-summary" class="bg-gradient-to-br from-primary to-primary-container text-on-primary px-8 py-4 rounded-full font-bold hover:scale-[1.02] active:scale-95 transition-all flex items-center gap-3 mx-auto">
            ${icon('task_alt')} สรุปผลการเสวนา
          </button>
        </div>` : ''}
      </div>
      <!-- Right: Empathy Wave -->
      <div class="lg:col-span-7 flex flex-col gap-5">

        <section class="bg-surface-container rounded-3xl p-7 relative overflow-hidden flex-1" style="min-height:280px">

            <div>
              <h2 class="font-bold text-on-surface text-lg">คลื่นความรู้สึก (Empathy Wave)</h2>
              <p class="text-sm text-on-surface-variant">เสียงสะท้อนจากผู้เข้าร่วม · ${state.emotions.length} ความรู้สึก</p>
            </div>
            ${fillIcon('waves','text-primary opacity-30 text-4xl')}

          <div class="flex flex-wrap gap-3 items-center justify-center" style="min-height:180px">

              <p class="text-xs text-on-surface-variant">ทีม A</p>
              <p class="text-sm font-bold ${state.teamADone?'text-primary':'text-on-surface'}">${state.teamADone ? 'พูดแล้ว' : (isA ? 'กำลังพูด...' : 'รอคิว')}</p>

          <div class="bg-${!isA ? 'tertiary-fixed/30' : 'surface-container-low'} rounded-2xl p-4 flex items-center gap-3">

            <div>
              <p class="text-xs text-on-surface-variant">ทีม B</p>
              <p class="text-sm font-bold ${state.teamBDone?'text-tertiary':(!isA?'text-tertiary':'text-on-surface')}">${state.teamBDone ? 'พูดแล้ว' : (!isA ? 'กำลังพูด...' : 'รอคิว')}</p>
            </div>

        </div>
      </div>

/* --- SUMMARY --- */
function renderSummary(state) {
  const card = getCard(state.catId, state.cardId);
  const topEmotions = {};
  state.emotions.forEach(e => topEmotions[e.text] = (topEmotions[e.text]||0)+1);
  const sorted = Object.entries(topEmotions).sort((a,b)=>b[1]-a[1]).slice(0,8);
  return `
  ${stageNav(state)}
  <main class="max-w-5xl mx-auto px-6 py-12 text-center">
    <div class="mb-8 inline-block">
      ${fillIcon('spa','text-6xl text-primary')}

/* ============================================================
   MOBILE SCREENS
   ============================================================ */
function renderMobile(state) {
  const pid = getMobilePid();
  const player = state.players.find(p=>p.id===pid);

  if (!player) return renderMobileJoin(state);
  switch(state.phase) {
    case 'lobby': return renderMobileWaiting(state, player);
    case 'teams': return renderMobileTeamRole(state, player);
    case 'category': case 'cards': case 'detail': return renderMobileWaitingGame(state, player);
    case 'discussion': return renderMobileEmotions(state, player);
    case 'summary': return renderMobileSummary(state, player);
    default: return renderMobileWaiting(state, player);
  }
}

function getMobilePid() {
  let id = sessionStorage.getItem('sh_pid');
  if (!id) { id = 'p_' + Date.now() + '_' + Math.random().toString(36).slice(2,9); sessionStorage.setItem('sh_pid',id); }
  return id;
}

function mobileTopBar(title, phase='') {
  const state = getState();
  return `
  <nav class="fixed top-0 w-full z-50 bg-primary/90 backdrop-blur-xl h-14 flex items-center justify-between px-5">
    <span class="text-sm font-bold text-on-primary font-headline">${title}</span>
    <span class="text-xs bg-white/20 text-white px-2 py-0.5 rounded-full">${state.roomCode}</span>
  </nav>`;
}

function renderMobileJoin(state) {
  const pid = getMobilePid();
  const avatarIdx = Math.floor(Math.random()*AVATARS.length);
  // Room code from URL param (what the QR code encoded)
  const urlRoom = new URLSearchParams(location.search).get('room') || '';
  // Check if URL room matches current game room
  const roomMismatch = urlRoom && state.roomCode && urlRoom !== state.roomCode;

  return `
  <div class="min-h-screen bg-gradient-to-br from-primary to-primary-container flex flex-col">
    <div class="flex-1 flex flex-col items-center justify-center px-6 py-10">
      <div class="mb-6">${fillIcon('spa','text-6xl text-white opacity-80')}</div>
      <h1 class="text-3xl font-extrabold text-white font-headline mb-2">SANTI</h1>
      <p class="text-white/70 mb-8 text-center">เข้าร่วมเซสชัน</p>

      ${roomMismatch ? `
      <div class="w-full max-w-sm bg-white/20 backdrop-blur rounded-2xl p-4 mb-4 flex items-start gap-3">
        ${icon('sync_problem','text-white text-xl flex-shrink-0 mt-0.5')}
        <div>
          <p class="text-white font-bold text-sm">ห้องไม่ตรงกัน</p>
          <p class="text-white/80 text-xs mt-1">QR นี้สำหรับห้อง <strong>${urlRoom}</strong> แต่เซสชันปัจจุบันคือ <strong>${state.roomCode}</strong></p>
          <p class="text-white/70 text-xs mt-1">ถ้าวิทยากรเพิ่งรีเซ็ต ให้สแกน QR ใหม่อีกครั้ง</p>
        </div>
      </div>` : `
      <div class="w-full max-w-sm bg-white/10 rounded-2xl px-5 py-3 mb-4 text-center">
        <p class="text-white/60 text-xs uppercase tracking-widest mb-1">ห้อง</p>
        <p class="text-white font-bold text-xl">${urlRoom || state.roomCode}</p>
      </div>`}

      <div class="w-full max-w-sm bg-white/10 backdrop-blur rounded-3xl p-8 space-y-5">
        <h2 class="text-white font-bold text-xl text-center">ชื่อเล่น (Nickname)</h2>
        <input id="mobile-name" type="text" maxlength="20" placeholder="ชื่อเล่นของคุณ..."
          class="w-full bg-white/20 text-white placeholder:text-white/50 border-none rounded-2xl px-5 py-4 text-lg focus:ring-2 focus:ring-white/30 outline-none">
        <button data-action="mobile-join" data-pid="${pid}" data-avatar="${avatarIdx}"
          class="w-full bg-white text-primary font-bold py-4 rounded-2xl text-lg hover:scale-[1.02] active:scale-95 transition-all ${roomMismatch ? 'opacity-60' : ''}">

  </div>`;
}

function renderMobileWaiting(state, player) {

                ${state.settings.maxPlayers ? `<button data-action="set-max-players:0" class="text-xs text-on-surface-variant hover:text-primary transition-colors ml-1">ไม่จำกัด</button>` : ''}
              </div>
            </div>
          </div>
          <div class="mt-5 pt-5 border-t border-outline-variant/20">
            <p class="text-xs font-bold uppercase tracking-widest text-error mb-3">Danger Zone</p>
            <button data-action="reset-game" class="border border-error/30 text-error px-6 py-2.5 rounded-full font-bold text-sm hover:bg-error-container/20 transition-colors">
              ${icon('refresh','text-sm align-middle')} Reset Session ทั้งหมด
            </button>
          </div>
        </section>
      </div>
      <!-- Participants -->
      <div class="space-y-6">
        <section class="bg-surface-container-low rounded-3xl p-6">
          <div class="flex items-center justify-between mb-4">
            <h2 class="text-lg font-bold text-primary">Participants</h2>
            <span class="text-xs font-bold bg-primary/10 text-primary px-2 py-1 rounded">${state.players.length} Online</span>
          </div>
          <div class="space-y-3 max-h-80 overflow-y-auto">
            ${state.players.length === 0
              ? '<p class="text-sm text-on-surface-variant italic text-center py-4">ยังไม่มีผู้เข้าร่วม</p>'
              : state.players.map(p=>`
                <div class="flex items-center gap-3 bg-surface-container-lowest rounded-xl p-3">
                  <div class="w-9 h-9 rounded-full bg-primary-fixed flex items-center justify-center">${p.avatar}</div>
                  <div class="flex-1 min-w-0">
                    <p class="text-sm font-bold truncate">${p.name}</p>
                    <p class="text-xs text-on-surface-variant">ทีม ${p.teamId||'?'}</p>
                  </div>
                  <div class="w-2 h-2 rounded-full bg-emerald-400 flex-shrink-0"></div>
                </div>`).join('')}
          </div>
        </section>
        <!-- Game phase status -->
        <section class="bg-surface-container-low rounded-3xl p-6">
          <h2 class="text-lg font-bold text-primary mb-4">Game Status</h2>
          <div class="space-y-2">
            ${['lobby','teams','category','cards','detail','discussion','summary'].map(ph => `
              <div class="flex items-center gap-2 ${state.phase===ph?'text-primary font-bold':'text-on-surface-variant'}">
                <div class="w-2 h-2 rounded-full ${state.phase===ph?'bg-primary':'bg-surface-container-highest'} flex-shrink-0"></div>
                <span class="text-sm capitalize">${ph}</span>
                ${state.phase===ph?icon('arrow_right','text-sm ml-auto'):''}
              </div>`).join('')}
          </div>
        </section>
      </div>
    </div>
  </div>`;
}

/* ============================================================
   MAIN RENDER
   ============================================================ */
function render() {
  const mode = getMode();
  const state = getState();
  const app = document.getElementById('app');
  if (!app) return;

  if (mode === 'settings') app.innerHTML = renderSettings(state);
  else if (mode === 'mobile') app.innerHTML = renderMobile(state);
  else app.innerHTML = renderStage(state);

  afterRender(mode, state);
}

function renderStage(state) {
  switch(state.phase) {
    case 'lobby':      return renderLobby(state);
    case 'teams':      return renderTeams(state);
    case 'category':   return renderCategory(state);
    case 'cards':      return renderCards(state);
    case 'detail':     return renderCardDetail(state);
    case 'discussion': return renderDiscussion(state);
    case 'summary':    return renderSummary(state);
    default:           return renderLobby(state);
  }
}

function afterRender(mode, state) {
  if (mode === 'stage') {
    if (state.phase === 'lobby') generateQR(state.roomCode);
    if (state.phase === 'discussion') {
      updateTimerUI(state);
      if (state.timerRunning && !_timer) startTimer();
    }
  }
}

function getMobileURL(roomCode) {
  return `${location.protocol}//${location.host}${location.pathname}?view=mobile&room=${encodeURIComponent(roomCode)}`;
}

function generateQR(roomCode) {
  const qrEl = document.getElementById('qr-code');
  if (!qrEl) return;
  qrEl.innerHTML = '';
  const url = getMobileURL(roomCode);
  // Update the link display too
  const linkEl = document.getElementById('mobile-url');
  if (linkEl) linkEl.textContent = url;
  if (typeof QRCode !== 'undefined') {
    new QRCode(qrEl, { text:url, width:130, height:130, colorDark:'#00464a', colorLight:'#ffffff', correctLevel:QRCode.CorrectLevel.M });
  } else {
    qrEl.innerHTML = `<div class="text-xs text-on-surface-variant p-3 font-mono break-all">${url}</div>`;
  }
}

/* ============================================================
   EVENT HANDLING
   ============================================================ */
document.addEventListener('click', (e) => {
  const el = e.target.closest('[data-action]');
  if (!el) return;
  const raw = el.dataset.action;
  const [action, ...rest] = raw.split(':');
  handleAction(action, rest.join(':'), el, e);
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    const joinBtn = document.querySelector('[data-action="mobile-join"]');
    if (joinBtn) joinBtn.click();
    const customBtn = document.querySelector('[data-action="send-custom-emotion"]');
    if (customBtn) customBtn.click();
  }
});

function handleAction(action, param, el, e) {
  const state = getState();
  switch(action) {

    case 'assign-teams': {
      if (state.players.length < 2) return;
      const shuffled = [...state.players].sort(()=>Math.random()-.5);
      const half = Math.ceil(shuffled.length/2);
      const players = shuffled.map((p,i) => ({...p, teamId: i < half ? 'A' : 'B'}));
      patchState({ players, phase:'teams' });
      break;
    }

    case 'go-category': patchState({ phase:'category' }); break;
    case 'go-cards': patchState({ phase:'cards' }); break;

    case 'select-cat': {
      patchState({ catId: param, cardId:null, phase:'cards' });
      break;
    }

    case 'select-card': {
      patchState({ cardId: param, phase:'detail' });
      break;
    }

    case 'start-discussion': {
      patchState({ phase:'discussion', speakingTeam:'A', timerSec: state.settings.teamATime, timerRunning:false, teamADone:false, teamBDone:false, emotions:[] });
      break;
    }

    case 'toggle-timer': {
      const running = !state.timerRunning;
      const ns = { ...getState(), timerRunning: running };
      saveState(ns);
      if (running) startTimer();
      else stopTimer();
      render();
      break;
    }

    case 'timer-plus': {
      patchState({ timerSec: getState().timerSec + 60 });
      break;
    }

    case 'timer-minus': {
      const s = Math.max(10, getState().timerSec - 60);
      patchState({ timerSec: s });
      break;
    }

    case 'go-next-team': {
      stopTimer();
      const ns = getState();
      if (ns.speakingTeam === 'A') {
        patchState({ speakingTeam:'B', timerSec: ns.settings.teamBTime, timerRunning:false, teamADone:true });
      } else {
        // Switch back to Team A
        patchState({ speakingTeam:'A', timerSec: ns.settings.teamATime, timerRunning:false, teamADone:false });
      }
      break;
    }

    case 'go-summary': {
      stopTimer();
      patchState({ phase:'summary', timerRunning:false });
      break;
    }

    case 'reset-game': {
      stopTimer();
      const fresh = defaultState();
      fresh.roomCode = state.roomCode;
      saveState(fresh);
      // Clear player session only in mobile
      if (getMode() === 'mobile') sessionStorage.removeItem('sh_pid');
      render();
      break;
    }

    case 'add-demo-players': {
      const existing = state.players.length;
      const toAdd = Math.max(0, 12 - existing);
      const newPlayers = [];
      for (let i = 0; i < toAdd; i++) {
        const idx = (existing + i) % DEMO_NAMES.length;
        newPlayers.push({ id:'demo_'+Date.now()+'_'+i, name:DEMO_NAMES[idx], avatar:AVATARS[idx%AVATARS.length], teamId:null });
      }
      patchState({ players: [...state.players, ...newPlayers] });
      break;
    }

    case 'clear-players': {
      patchState({ players:[] });
      break;
    }

    case 'copy-room': {
      navigator.clipboard.writeText(state.roomCode).catch(()=>{});
      const orig = el.innerHTML;
      el.innerHTML = icon('check','text-primary');
      setTimeout(()=>{ el.innerHTML = orig; }, 1500);
      break;
    }

    case 'mobile-join': {
      const nameEl = document.getElementById('mobile-name');
      const name = nameEl?.value.trim();
      if (!name) { nameEl?.focus(); return; }
      const pid = el.dataset.pid;
      const avatarIdx = parseInt(el.dataset.avatar||'0');
      if (state.players.find(p=>p.id===pid)) { render(); return; }
      const max = state.settings?.maxPlayers || 0;
      if (max > 0 && state.players.length >= max) {
        const app = document.getElementById('app');
        if (app) app.innerHTML = `<div class="min-h-screen bg-gradient-to-br from-primary to-primary-container flex flex-col items-center justify-center px-6 text-center">
          ${fillIcon('group_off','text-6xl text-white opacity-80 mb-4')}
          <h1 class="text-2xl font-extrabold text-white mb-3">ห้องเต็มแล้ว</h1>
          <p class="text-white/80">ผู้เข้าร่วมครบ ${max} คนแล้ว</p>
        </div>`;
        return;
      }
      const player = { id:pid, name, avatar:AVATARS[avatarIdx%AVATARS.length], teamId:null };
      patchState({ players:[...state.players, player] });
      break;
    }

    case 'send-emotion': {
      const text = decodeURIComponent(param);
      const pid = getMobilePid();
      const emotion = { text, pid, id:Date.now()+'_'+Math.random().toString(36).slice(2) };
      patchState({ emotions:[...state.emotions, emotion] });
      // Animate feedback
      el.classList.add('scale-95','opacity-50');
      setTimeout(()=>{ el.classList.remove('scale-95','opacity-50'); },300);
      break;
    }

    case 'send-custom-emotion': {
      const input = document.getElementById('custom-emotion');
      const text = input?.value.trim();
      if (!text) return;
      const pid = getMobilePid();
      const emotion = { text, pid, id:Date.now()+'_'+Math.random().toString(36).slice(2) };
      patchState({ emotions:[...state.emotions, emotion] });
      if (input) input.value = '';
      break;
    }

    case 'set-time': {
      const [team, deltaStr] = param.split(':');
      const delta = parseInt(deltaStr) * 60;
      const key = team==='A' ? 'teamATime' : 'teamBTime';
      const cur = state.settings[key];
      const next = Math.max(30, cur + delta);
      patchState({ settings:{...state.settings, [key]:next} });
      break;
    }

    case 'save-room-code': {
      const input = document.getElementById('room-code-input');
      const val = (input?.value || '').trim().toUpperCase().replace(/\s+/g,'');
      if (val.length >= 2) patchState({ roomCode: val });
      break;
    }

    case 'random-room-code': {
      const n = Math.floor(Math.random()*90+10);
      const newCode = 'SANTI-' + n;
      const input = document.getElementById('room-code-input');
      if (input) input.value = newCode;
      patchState({ roomCode: newCode });
      break;
    }

    case 'set-max-players': {
      const delta = parseInt(param);
      if (delta === 0) {
        patchState({ settings: { ...state.settings, maxPlayers: 0 } });
      } else {
        const cur = state.settings.maxPlayers || 0;
        const next = Math.max(0, cur + delta);
        patchState({ settings: { ...state.settings, maxPlayers: next } });
      }
      break;
    }

    case 'open-settings': {
      window.open(`${location.pathname}?view=settings`, '_blank');
      break;
    }
  }
}

/* ============================================================
   INIT
   ============================================================ */
async function init() {
  const mode = getMode();
  const urlRoom = new URLSearchParams(location.search).get('room') || '';

  if (mode === 'mobile') {
    // MOBILE: never create own state — always pull from server or stage
    await initMobile(urlRoom);
    return;
  }

  // STAGE / SETTINGS: create state if needed, push to server
  if (IS_SERVER) {
    try {
      const existingRoom = localStorage.getItem(STORAGE_KEY)
        ? (JSON.parse(localStorage.getItem(STORAGE_KEY)).roomCode || '')
        : '';
      const res = await fetch('/api/state?room=' + encodeURIComponent(existingRoom));
      if (!res.ok) throw new Error('no-api');
      const serverState = await res.json();
      if (serverState && serverState.roomCode) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(serverState));
      } else {
        if (!localStorage.getItem(STORAGE_KEY)) saveState(defaultState());
        else saveState(getState()); // push existing state to server
      }
    } catch(e) {
      // No server.js API — static server fallback
      if (!localStorage.getItem(STORAGE_KEY)) saveState(defaultState());
    }
  } else {
    if (!localStorage.getItem(STORAGE_KEY)) saveState(defaultState());
  }

  render();
  const s = getState();
  if (s && s.phase === 'discussion' && s.timerRunning) startTimer();
  // Stage also subscribes to SSE so it receives updates when players join from mobile
  if (IS_SERVER) connectSSE();
}

// Mobile-specific init: wait for server state, never create own state
async function initMobile(urlRoom) {
  if (IS_SERVER) {
    try {
      const res = await fetch('/api/state?room=' + encodeURIComponent(urlRoom));
      if (!res.ok) throw new Error('no-api');
      const serverState = await res.json();
      if (serverState && serverState.roomCode) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(serverState));
        connectSSE(urlRoom);
        render();
        return;
      }
      // Server online but no game yet — wait for stage to start
      showConnecting(urlRoom, 'waiting');
      pollMobileState(urlRoom);
    } catch(e) {
      // No /api/state (running npx serve, not node server.js)
      if (localStorage.getItem(STORAGE_KEY)) {
        render(); // same device — already have state from stage tab
      } else {
        showConnecting(urlRoom, 'no-api');
        // Keep checking localStorage in case stage opens on same device
        const poll = setInterval(() => {
          if (localStorage.getItem(STORAGE_KEY)) { clearInterval(poll); render(); }
        }, 1000);
      }
    }
  } else {
    // file:// — same device only
    if (localStorage.getItem(STORAGE_KEY)) render();
    else {
      showConnecting(urlRoom, 'no-api');
      const poll = setInterval(() => {
        if (localStorage.getItem(STORAGE_KEY)) { clearInterval(poll); render(); }
      }, 1000);
    }
  }
}

function showConnecting(urlRoom, reason) {
  const app = document.getElementById('app');
  if (!app) return;
  const isNoApi = reason === 'no-api';
  app.innerHTML = `
  <div class="min-h-screen bg-gradient-to-br from-primary to-primary-container flex flex-col items-center justify-center px-6 text-center">
    <div class="mb-6 ${isNoApi ? '' : 'animate-pulse'}">${fillIcon('spa','text-6xl text-white opacity-80')}</div>
    <h1 class="text-3xl font-extrabold text-white font-headline mb-3">
      ${isNoApi ? 'เชื่อมต่อไม่สำเร็จ' : 'กำลังเชื่อมต่อ...'}
    </h1>
    ${urlRoom ? `<p class="text-white/70 mb-5">ห้อง: <span class="font-bold text-white">${urlRoom}</span></p>` : ''}
    <div class="bg-white/15 backdrop-blur rounded-3xl p-6 max-w-xs w-full">
      ${isNoApi ? `
        <p class="text-white font-bold text-sm mb-2">ต้องรัน server.js ก่อน</p>
        <p class="text-white/80 text-sm leading-relaxed mb-3">เปิด Terminal บนคอมพิวเตอร์วิทยากรแล้วพิมพ์:</p>
        <code class="block bg-black/30 text-white/90 text-xs px-4 py-3 rounded-xl font-mono mb-4">node server.js</code>
        <p class="text-white/60 text-xs">จากนั้นสแกน QR ใหม่</p>
      ` : `
        <div class="flex items-center justify-center gap-3 text-white/80 text-sm mb-3">
          <span class="w-2.5 h-2.5 bg-white rounded-full animate-ping flex-shrink-0"></span>
          รอวิทยากรเปิดเซสชัน...
        </div>
        <p class="text-white/50 text-xs">หน้านี้จะอัปเดตเองเมื่อเซสชันเริ่ม</p>
      `}
    </div>
  </div>`;
}

function pollMobileState(urlRoom, attempt) {
  attempt = attempt || 0;
  if (attempt > 90) return; // give up after 3 min
  setTimeout(async () => {
    try {
      const res = await fetch('/api/state?room=' + encodeURIComponent(urlRoom));
      if (!res.ok) throw new Error('no-api');
      const serverState = await res.json();
      if (serverState && serverState.roomCode) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(serverState));
        connectSSE(urlRoom);
        render();
        return;
      }
    } catch(e) {}
    pollMobileState(urlRoom, attempt + 1);
  }, 2000);
}

// Server-Sent Events — real-time push from server to all clients (stage + mobile)
function connectSSE(roomCode) {
  if (!roomCode) {
    const s = localStorage.getItem(STORAGE_KEY);
    roomCode = s ? (JSON.parse(s).roomCode || '') : '';
  }
  const evtSource = new EventSource('/api/events?room=' + encodeURIComponent(roomCode));
  evtSource.onmessage = (e) => {
    try {
      const serverState = JSON.parse(e.data);
      if (!serverState || !serverState.roomCode) return;
      // Ignore SSE that bounced back from our own recent save (within 1 sec)
      if (getMode() !== 'mobile' && Date.now() - _lastSaveTs < 1000) return;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(serverState));
      render();
    } catch(ex) {}
  };
  evtSource.onerror = () => {
    evtSource.close();
    // Fall back to polling every 2 seconds
    setInterval(async () => {
      try {
        const res = await fetch('/api/state?room=' + encodeURIComponent(roomCode));
        const s = await res.json();
        if (s && s.roomCode) {
          // Same bounce-guard for stage polling
          if (getMode() !== 'mobile' && Date.now() - _lastSaveTs < 1000) return;
          localStorage.setItem(STORAGE_KEY, JSON.stringify(s));
          render();
        }
      } catch(ex) {}
    }, 2000);
  };
}

init();
</script>
